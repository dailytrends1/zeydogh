<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Step</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container{
    width:90%;
    max-width:400px;
}

.logo{
    font-size:26px;
    font-weight:bold;
    margin-bottom:20px;
}

.question{
    font-size:22px;
    margin-bottom:20px;
}

.input-box{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    margin-bottom:20px;
    font-size:16px;
    outline:none;
}

.btn{
    width:100%;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#FE2C55;
    color:#fff;
    cursor:pointer;
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.05);
    opacity:0.9;
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">Answer the Question Below</div>
    <div class="question">What is your name?</div>

    <input type="text" id="name" class="input-box" placeholder="Enter your name...">

    <button class="btn" onclick="submitForm()">Continue</button>
</div>

<script>
function submitForm(){
    var name = document.getElementById("name").value.trim();

    if(name === ""){
        alert("Please enter your name");
        return;
    }

    // Optional: pass name in URL
    var link = "https://ln.run/xR-rK?name=" + encodeURIComponent(name);

    window.location.href = link;
}
</script>

</body>
</html>
